name: Build HR Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'tsconfig.app.json'
      - 'tsconfig.node.json'
      - 'vite.config.ts'
      - 'index.html'
      - 'Dockerfile'
      - 'nginx.conf'
      - '.github/workflows/deploy-hr.yml'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 387721658341.dkr.ecr.ap-northeast-2.amazonaws.com

jobs:
  publish-hr:
    name: Publish HR Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::387721658341:role/DnDn-PRD-GHA-Deploy-Role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        run: |
          REPO=${{ env.ECR_REGISTRY }}/dndn-prd-hr
          docker build -t $REPO:${{ github.sha }} -t $REPO:latest .
          docker push $REPO:${{ github.sha }}
          docker push $REPO:latest
          echo "HR image: $REPO:${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"

  update-gitops:
    name: Update GitOps manifest
    needs: publish-hr
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Infra repo
        uses: actions/checkout@v4
        with:
          repository: ACS-DnDn/DnDn-Infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          ref: main

      - name: Update image tag
        run: |
          SHA=${{ github.sha }}
          FILE="gitops/environments/prod/apps/dndn-hr/deployment.yaml"
          sed -i "s|${{ env.ECR_REGISTRY }}/dndn-prd-hr:.*|${{ env.ECR_REGISTRY }}/dndn-prd-hr:${SHA}|" "$FILE"
          echo "✓ Updated $FILE → dndn-prd-hr:${SHA}"

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(gitops): update HR image tag from DnDn-HR@${GITHUB_SHA::7}"
          git push
